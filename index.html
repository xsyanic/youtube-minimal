<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<head>
<meta charset="UTF-8">
<title>YouTube Search</title>

<link rel="icon" type="image/png"
href="favicon_32x32.png">

<style>

*{box-sizing:border-box}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:#181818;
}

.wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

.container{
    display:flex;
    align-items:center;
}

.logo{
    height:26px;
    margin-right:12px;
}

.search{
    display:flex;
    border:1px solid #444;
}

.search input{
    width:360px;
    padding:7px 10px;
    border:none;
    outline:none;
    font-size:14px;
    background:#121212;
    color:white;
}

.search button{
    width:40px;
    border:none;
    border-left:1px solid #444;
    background:#2a2a2a;
    cursor:pointer;
}

.search svg{
    width:16px;
    height:18px;
    fill:white;
}

/* NOTES */

.notes{
    width:412px;
    border:1px solid #444;
}

.notes textarea{
    width:100%;
    height:90px;
    padding:8px 10px;
    resize:none;
    border:none;
    outline:none;
    font-size:13px;
    background:#121212;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

/* FOOTER */

.footer{
    position:fixed;
    bottom:14px;
    width:100%;
    text-align:center;
    font-size:12px;
}

.footer a{
    color:#888;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}

/* TOGGLE */

.toggle{
    position:fixed;
    top:20px;
    right:20px;
}

.toggle button{
    padding:6px 12px;
    border:1px solid #444;
    background:#2a2a2a;
    color:white;
    cursor:pointer;
}

/* LIGHT MODE */

body.light{
    background:#f9f9f9;
}

body.light .search,
body.light .notes{
    border:1px solid #ccc;
}

body.light input,
body.light textarea{
    background:white;
    color:black;
}

body.light .search button{
    background:#f8f8f8;
    border-left:1px solid #ccc;
}

body.light .search svg{
    fill:black;
}

body.light .toggle button{
    background:white;
    color:black;
    border:1px solid #ccc;
}

body.light .footer a{
    color:#777;
}

/* LOGO INVERT */

body.dark .logo{
    filter:invert(1);
}

</style>
</head>

<body class="dark">

<div class="toggle">
<button onclick="toggleDark()">Appearence</button>
</div>

<div class="wrapper">

<div class="container">

<img class="logo"
src="https://www.gstatic.com/youtube/img/branding/youtubelogo/2x/youtubelogo_50.png">

<form class="search" id="searchForm">
<input id="q" type="text" placeholder="Search">
<button type="submit">
<svg viewBox="0 0 24 24">
<path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5
6.5 6.5 0 109.5 16c1.61 0 3.09-.59
4.23-1.57l.27.28v.79L20
21.5 21.5 20l-4.5-4.5zm-6
0C7.01 14 5 11.99 5 9.5S7.01
5 9.5 5 14 7.01 14 9.5
11.99 14 9.5 14z"/>
</svg>
</button>
</form>

</div>

<div class="notes">
<textarea id="notes" placeholder="Notes..."></textarea>
</div>

</div>

<div class="footer">
<a href="https://github.com/xsyanic" target="_blank">by @xsyanic on GitHub</a>
</div>

<script>

function setCookie(name,value,days){
    const d=new Date()
    d.setTime(d.getTime()+(days*24*60*60*1000))
    document.cookie=name+"="+value+";path=/;expires="+d.toUTCString()
}

function getCookie(name){
    const cookies=document.cookie.split(";")
    for(let c of cookies){
        let [k,v]=c.trim().split("=")
        if(k===name) return v
    }
}

function toggleDark(){
    const body=document.body
    body.classList.toggle("light")
    body.classList.toggle("dark")

    const mode=body.classList.contains("dark")?"dark":"light"
    setCookie("theme",mode,365)
}

(function(){

    const saved=getCookie("theme")
    if(saved==="light"){
        document.body.classList.remove("dark")
        document.body.classList.add("light")
    }

    const notes=getCookie("notes")
    if(notes){
        document.getElementById("notes").value=decodeURIComponent(notes)
    }

})()

document.getElementById("searchForm").onsubmit=function(e){
    e.preventDefault()
    const q=document.getElementById("q").value.trim()
    if(!q) return
    window.location="https://www.youtube.com/results?search_query="+encodeURIComponent(q)
}

document.getElementById("notes").addEventListener("input",function(){
    setCookie("notes",encodeURIComponent(this.value),365)
})

</script>

</body>
</html>
